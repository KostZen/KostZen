name: Metrics
on:
  # Запуск по расписанию (каждый день в полночь)
  schedule: [{cron: "0 0 * * *"}]
  # Возможность запустить вручную кнопкой
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: KostZen # Замените на свой ник
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Kaliningrad # Укажите ваш часовой пояс
          
          # Настройки плагинов как на скриншоте:
          plugin_languages: yes
          plugin_languages_sections: most-used, percentages
          plugin_languages_details: bytes-size, percentage
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_pagespeed: yes # Интеграция с тестами скорости (нужен будет доп. токен Google, можно пока убрать)
